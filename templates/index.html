<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Jira</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; height: 100vh; display: flex; flex-direction: column; }
header { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; font-weight: 600; }
.btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn-primary { background: #4361ee; color: #fff; }
.btn-success { background: #2ec4b6; color: #fff; }
.btn-danger { background: #e63946; color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

.main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar { width: 320px; min-width: 320px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
.sidebar-header { padding: 12px 16px; border-bottom: 1px solid #eee; }
.filter-bar { display: flex; gap: 4px; }
.filter-btn { padding: 4px 10px; border: 1px solid #ddd; background: #fff; border-radius: 12px; cursor: pointer; font-size: 12px; }
.filter-btn.active { background: #4361ee; color: #fff; border-color: #4361ee; }
.task-list { flex: 1; overflow-y: auto; }
.task-item { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background .1s; }
.task-item:hover { background: #f8f9fa; }
.task-item.active { background: #eef0ff; border-left: 3px solid #4361ee; }
.task-item-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.task-item-meta { font-size: 11px; color: #888; display: flex; gap: 8px; align-items: center; }
.status-badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
.status-open { background: #dbeafe; color: #1e40af; }
.status-in_progress { background: #fef3c7; color: #92400e; }
.status-done { background: #d1fae5; color: #065f46; }

/* Detail */
.detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.detail-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 15px; }
.detail-header { padding: 16px 24px; border-bottom: 1px solid #eee; background: #fff; }
.detail-header h2 { font-size: 18px; margin-bottom: 8px; }
.detail-header-actions { display: flex; gap: 8px; align-items: center; }
.detail-header-actions select { padding: 4px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }

.tabs { display: flex; gap: 0; background: #fff; border-bottom: 1px solid #eee; padding: 0 24px; }
.tab { padding: 10px 16px; cursor: pointer; font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; color: #666; }
.tab.active { color: #4361ee; border-bottom-color: #4361ee; }

.tab-content { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* Description */
.desc-text { white-space: pre-wrap; font-size: 14px; line-height: 1.6; color: #333; }
.desc-edit { width: 100%; min-height: 120px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; resize: vertical; }

/* Comments & Questions */
.entry { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; }
.entry-meta { font-size: 11px; color: #999; margin-bottom: 6px; }
.entry-text { font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
.answer-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
.answer-label { font-size: 11px; font-weight: 600; color: #4361ee; text-transform: uppercase; margin-bottom: 4px; }
.answer-text { font-size: 14px; line-height: 1.5; white-space: pre-wrap; color: #333; }
.no-answer { color: #bbb; font-style: italic; font-size: 13px; }

.input-row { display: flex; gap: 8px; margin-top: 16px; }
.input-row textarea { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 38px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #fff; border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw; }
.modal h3 { margin-bottom: 16px; font-size: 16px; }
.modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; margin-top: 12px; }
.modal input, .modal textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
.modal textarea { min-height: 80px; resize: vertical; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

.answer-form { margin-top: 8px; }
.answer-form textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; min-height: 60px; resize: vertical; }
.answer-form-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 6px; }

@media (max-width: 768px) {
  .main { flex-direction: column; }
  .sidebar { width: 100%; min-width: 0; max-height: 40vh; }
}
</style>
</head>
<body>

<header>
  <h1>Simple Jira</h1>
  <button class="btn btn-primary" onclick="openCreateModal()">+ New Task</button>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="filter-bar">
        <button class="filter-btn active" data-status="">All</button>
        <button class="filter-btn" data-status="open">Open</button>
        <button class="filter-btn" data-status="in_progress">In Progress</button>
        <button class="filter-btn" data-status="done">Done</button>
      </div>
    </div>
    <div class="task-list" id="taskList"></div>
  </div>

  <div class="detail" id="detail">
    <div class="detail-empty">Select a task or create a new one</div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="createModal" style="display:none" onclick="if(event.target===this)closeCreateModal()">
  <div class="modal">
    <h3>New Task</h3>
    <label>Title</label>
    <input id="newTitle" placeholder="Task title...">
    <label>Description</label>
    <textarea id="newDesc" placeholder="Describe the task..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeCreateModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitCreate()">Create</button>
    </div>
  </div>
</div>

<script>
const API = '/api';
let tasks = [];
let currentTaskId = null;
let currentTab = 'desc';
let currentFilter = '';

// --- API helpers ---
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (res.status === 204) return null;
  return res.json();
}

// --- Tasks ---
async function loadTasks() {
  const url = currentFilter ? `/tasks?status=${currentFilter}` : '/tasks';
  tasks = await api(url);
  renderTaskList();
}

function renderTaskList() {
  const el = document.getElementById('taskList');
  if (!tasks.length) {
    el.innerHTML = '<div style="padding:24px;text-align:center;color:#aaa;font-size:13px">No tasks yet</div>';
    return;
  }
  el.innerHTML = tasks.map(t => `
    <div class="task-item ${t.id === currentTaskId ? 'active' : ''}" onclick="selectTask(${t.id})">
      <div class="task-item-title">${esc(t.title)}</div>
      <div class="task-item-meta">
        <span class="status-badge status-${t.status}">${statusLabel(t.status)}</span>
        <span>${timeAgo(t.updated_at)}</span>
      </div>
    </div>
  `).join('');
}

async function selectTask(id) {
  currentTaskId = id;
  renderTaskList();
  await renderDetail();
}

async function renderDetail() {
  const task = tasks.find(t => t.id === currentTaskId);
  if (!task) {
    document.getElementById('detail').innerHTML = '<div class="detail-empty">Select a task</div>';
    return;
  }
  document.getElementById('detail').innerHTML = `
    <div class="detail-header">
      <h2>${esc(task.title)}</h2>
      <div class="detail-header-actions">
        <select onchange="changeStatus(${task.id}, this.value)">
          <option value="open" ${task.status==='open'?'selected':''}>Open</option>
          <option value="in_progress" ${task.status==='in_progress'?'selected':''}>In Progress</option>
          <option value="done" ${task.status==='done'?'selected':''}>Done</option>
        </select>
        <button class="btn btn-danger btn-sm" onclick="deleteTask(${task.id})">Delete</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${currentTab==='desc'?'active':''}" onclick="switchTab('desc')">Description</div>
      <div class="tab ${currentTab==='comments'?'active':''}" onclick="switchTab('comments')">Comments</div>
      <div class="tab ${currentTab==='questions'?'active':''}" onclick="switchTab('questions')">Questions</div>
    </div>
    <div class="tab-content" id="tabContent"></div>
  `;
  await renderTabContent();
}

async function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().startsWith(tab.slice(0,4))));
  await renderTabContent();
}

async function renderTabContent() {
  const el = document.getElementById('tabContent');
  if (!el) return;
  const task = tasks.find(t => t.id === currentTaskId);
  if (!task) return;

  if (currentTab === 'desc') {
    el.innerHTML = `
      <textarea class="desc-edit" id="descEdit" placeholder="Add a description...">${esc(task.description)}</textarea>
      <div style="margin-top:8px;display:flex;justify-content:flex-end">
        <button class="btn btn-primary btn-sm" onclick="saveDesc(${task.id})">Save</button>
      </div>
    `;
  } else if (currentTab === 'comments') {
    const comments = await api(`/tasks/${task.id}/comments`);
    el.innerHTML = comments.map(c => `
      <div class="entry">
        <div class="entry-meta">${formatDate(c.created_at)}</div>
        <div class="entry-text">${esc(c.text)}</div>
      </div>
    `).join('') + `
      <div class="input-row">
        <textarea id="newComment" placeholder="Add a comment..."></textarea>
        <button class="btn btn-primary btn-sm" onclick="addComment(${task.id})" style="align-self:flex-end">Send</button>
      </div>
    `;
  } else if (currentTab === 'questions') {
    const questions = await api(`/tasks/${task.id}/questions`);
    el.innerHTML = questions.map(q => `
      <div class="entry">
        <div class="entry-meta">${formatDate(q.created_at)}</div>
        <div class="entry-text">${esc(q.text)}</div>
        <div class="answer-section">
          <div class="answer-label">Answer</div>
          ${q.answer
            ? `<div class="answer-text">${esc(q.answer)}</div><div class="entry-meta">${formatDate(q.answered_at)}</div>`
            : `<div class="no-answer">No answer yet</div>
               <div class="answer-form">
                 <textarea id="ans_${q.id}" placeholder="Write an answer..."></textarea>
                 <div class="answer-form-actions">
                   <button class="btn btn-success btn-sm" onclick="submitAnswer(${q.id})">Answer</button>
                 </div>
               </div>`
          }
        </div>
      </div>
    `).join('') + `
      <div class="input-row">
        <textarea id="newQuestion" placeholder="Ask a question..."></textarea>
        <button class="btn btn-primary btn-sm" onclick="addQuestion(${task.id})" style="align-self:flex-end">Ask</button>
      </div>
    `;
  }
}

// --- Actions ---
async function changeStatus(id, status) {
  await api(`/tasks/${id}`, { method: 'PUT', body: { status } });
  await loadTasks();
  await renderDetail();
}

async function saveDesc(id) {
  const desc = document.getElementById('descEdit').value;
  await api(`/tasks/${id}`, { method: 'PUT', body: { description: desc } });
  await loadTasks();
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  await api(`/tasks/${id}`, { method: 'DELETE' });
  currentTaskId = null;
  await loadTasks();
  document.getElementById('detail').innerHTML = '<div class="detail-empty">Select a task</div>';
}

async function addComment(taskId) {
  const el = document.getElementById('newComment');
  const text = el.value.trim();
  if (!text) return;
  await api(`/tasks/${taskId}/comments`, { method: 'POST', body: { text } });
  await loadTasks();
  await renderTabContent();
}

async function addQuestion(taskId) {
  const el = document.getElementById('newQuestion');
  const text = el.value.trim();
  if (!text) return;
  await api(`/tasks/${taskId}/questions`, { method: 'POST', body: { text } });
  await loadTasks();
  await renderTabContent();
}

async function submitAnswer(qId) {
  const el = document.getElementById('ans_' + qId);
  const answer = el.value.trim();
  if (!answer) return;
  await api(`/questions/${qId}/answer`, { method: 'PUT', body: { answer } });
  await loadTasks();
  await renderTabContent();
}

// --- Create modal ---
function openCreateModal() {
  document.getElementById('createModal').style.display = 'flex';
  document.getElementById('newTitle').value = '';
  document.getElementById('newDesc').value = '';
  document.getElementById('newTitle').focus();
}
function closeCreateModal() {
  document.getElementById('createModal').style.display = 'none';
}
async function submitCreate() {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) return;
  const desc = document.getElementById('newDesc').value.trim();
  const task = await api('/tasks', { method: 'POST', body: { title, description: desc } });
  closeCreateModal();
  await loadTasks();
  await selectTask(task.id);
}

// --- Filters ---
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.status;
    loadTasks();
  });
});

// --- Utils ---
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function statusLabel(s) {
  return { open: 'Open', in_progress: 'In Progress', done: 'Done' }[s] || s;
}
function formatDate(d) {
  if (!d) return '';
  return new Date(d + 'Z').toLocaleString();
}
function timeAgo(d) {
  if (!d) return '';
  const diff = (Date.now() - new Date(d + 'Z')) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

// --- Init ---
loadTasks();
</script>
</body>
</html>
